spring.application.name=BookMyShow

# Local defaults — Render overrides these via Environment Variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:BMS}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=${DB_USE_SSL:false}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:2025}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8080}